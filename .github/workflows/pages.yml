name: Build and Deploy GitHub Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Crawl paper metadata
        env:
          OPENREVIEW_USERNAME: ${{ secrets.OPENREVIEW_USERNAME }}
          OPENREVIEW_PASSWORD: ${{ secrets.OPENREVIEW_PASSWORD }}
        run: |
          python -m llm_paper_crawler.cli crawl \
            --years 2024 2025 2026 \
            --sources arxiv neurips icml iclr openreview \
            --max-arxiv-results 500 \
            --output build/papers.jsonl

      - name: Build static site
        run: |
          python -m llm_paper_crawler.cli build-site \
            --input build/papers.jsonl \
            --site-dir site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
